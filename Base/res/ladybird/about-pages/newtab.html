<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>New Tab</title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <link rel="stylesheet" type="text/css" href="resource://ladybird/ladybird.css" />

        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                color: var(--text-color);
                font-family: "SerenitySans", sans-serif;
            }

            .panel {
                width: min(560px, 92vw);
                border-radius: 18px;
                padding: 28px;
                display: grid;
                gap: 18px;
                text-align: center;
            }

            .logo {
                width: 56px;
                height: 56px;
                margin: 0 auto 6px;
                display: grid;
                place-items: center;
                border-radius: 16px;
            }

            .logo img {
                width: 32px;
                height: 32px;
            }

            h1 {
                margin: 0;
                font-size: 24px;
                font-weight: 600;
                letter-spacing: 0.2px;
            }

            .tagline {
                margin-top: 6px;
                font-size: 14px;
                color: var(--url-text-color);
            }

            .search {
                display: grid;
                gap: 10px;
                position: relative;
            }

            .search .search-icon {
                position: absolute;
                left: 16px;
                top: 14px;
                color: var(--url-text-color);
                font-size: 14px;
                pointer-events: none;
            }

            .search input {
                width: 100%;
                font-size: 15px;
                padding: 12px 16px 12px 42px;
                border-radius: 999px;
                border: 1px solid var(--border-color);
                background: var(--input-background-color);
                color: var(--text-color);
                outline: none;
            }

            .search input:focus {
                border-color: var(--accent-color);
                box-shadow: 0 0 0 3px rgba(208, 106, 61, 0.18);
            }

            .primary-button {
                justify-self: center;
                padding: 10px 20px;
                border-radius: 999px;
                border: none;
                color: white;
                background: var(--accent-color);
                font-size: 14px;
                cursor: pointer;
            }

            .primary-button:focus-visible {
                outline: 2px solid rgba(208, 106, 61, 0.5);
                outline-offset: 2px;
            }
        </style>
    </head>

    <body>
        <main class="panel">
            <div>
                <div class="logo">
                    <img src="resource://icons/48x48/cryfox.png" alt="CryFox" />
                </div>
                <h1>CryFox</h1>
            </div>

            <!-- FORM ADDED -->
            <form class="search" id="searchForm">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input id="searchInput" type="search" placeholder="Search or enter address" />
                <button class="primary-button" type="submit">Search</button>
            </form>

            <p class="tagline">Privacy. Performance. Security.</p>
        </main>

        <script>
            const form = document.getElementById("searchForm");
            const input = document.getElementById("searchInput");

            form.addEventListener("submit", e => {
                e.preventDefault();

                const query = input.value.trim();
                if (!query) return;

                // Simple logic: URL vs search
                const isURL = query.includes(".") && !query.includes(" ");

                if (isURL) {
                    window.location.href = "https://" + query;
                } else {
                    window.location.href = "https://duckduckgo.com/?q=" + encodeURIComponent(query);
                }
            });
        </script>
    </body>
</html>
